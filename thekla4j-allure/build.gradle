plugins {
    id 'com.teststeps.java-conventions'
    id 'com.teststeps.thekla4j.publish'
    id 'com.teststeps.thekla4j.git'
}

tasks.withType(PublishToMavenRepository).configureEach { it.enabled = false }
tasks.withType(PublishToMavenLocal).configureEach { it.enabled = false }

tasks.named("spotlessApply") {
    dependsOn ':thekla4j-allure:shared:spotlessApply'
    dependsOn ':thekla4j-allure:junit-extensions:spotlessApply'
    dependsOn ':thekla4j-allure:cucumber-plugins:spotlessApply'
    dependsOn ':thekla4j-allure:thekla4j-allure2-plugin:spotlessApply'
}

tasks.named("spotlessCheck") {
    dependsOn ':thekla4j-allure:shared:spotlessCheck'
    dependsOn ':thekla4j-allure:junit-extensions:spotlessCheck'
    dependsOn ':thekla4j-allure:cucumber-plugins:spotlessCheck'
    dependsOn ':thekla4j-allure:thekla4j-allure2-plugin:spotlessCheck'
}
